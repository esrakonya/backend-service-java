server:
  port: 8080

spring:
  application:
    name: gateway-service
  profiles:
    active: local

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://auth-service:8080}
          predicates:
            - Path=/api/v1/auth/**
        - id: product-service
          uri: ${PRODUCT_SERVICE_URL:http://product-service:8080}
          predicates:
            - Path=/api/v1/products/**,/api/v1/categories/**
          filters:
            - name: CircuitBreaker
              args:
                name: productServiceCircuitBreaker
                fallbackUri: forward:/fallback/products
        - id: inventory-service
          uri: ${INVENTORY_SERVICE_URL:http://inventory-service:8080}
          predicates:
            - Path=/api/v1/inventory/**

resilience4j:
  circuitbreaker:
    instances:
      productServiceCircuitBreaker:
        registerHealthIndicator: true
        slidingWindowSize: 10
        permittedNumberOfCallsInHalfOpenState: 3
        waitDurationInOpenState: 5s
        failureRateThreshold: 50
  timelimiter:
    instances:
      productServiceCircuitBreaker:
        timeoutDuration: 5s

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: "1. Auth Service"
        url: "/api/v1/auth/v3/api-docs"
      - name: "2. Product Service"
        url: "/api/v1/products/v3/api-docs"
      - name: "3. Inventory Service"
        url: "/api/v1/inventory/v3/api-docs"

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.esrakonya.backend: INFO
    org.apache.kafka: INFO
    org.springframework.kafka: INFO

management:
  observations:
    key-values:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
    propagation:
      type: b3
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://marketplace-zipkin:9411/api/v2/spans}

app:
  security:
    jwt:
      secret: ${APPLICATION_SECURITY_JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}