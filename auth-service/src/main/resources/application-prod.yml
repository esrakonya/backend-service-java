app:
  environment: prod
  message: Auth Service is running on Docker Infrastructure

spring:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:marketplace-redis}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}

logging:
  level:
    org.hibernate.SQL: WARN
    io.lettuce: WARN
    org.springframework.security: INFO
    org.esrakonya.backend: INFO

logstash:
  host: ${LOGSTASH_HOST:marketplace-logstash}

management:
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL}