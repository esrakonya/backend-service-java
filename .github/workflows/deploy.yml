name: Deploy to Local K8s

on:
  workflow_dispatch:
    inputs:
      imageTag:
        description: 'Docker image tag (commit SHA)'
        required: true

jobs:
  deploy:
    runs-on: [self-hosted, local-deploy]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Helm Chart
        run: helm template marketplace ./helm-charts

      - name: Deploy with Helm
        run: |
          helm upgrade marketplace ./helm-charts \
            --install \
            --set global.imageTag=${{ github.event.inputs.imageTag }}